name: Simple File Manifest

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate File List
        run: |
          # Create output directory
          mkdir -p manifest
          
          # Create header
          echo "FILE MANIFEST" > manifest/files.txt
          echo "Generated: $(date)" >> manifest/files.txt
          echo "========================================" >> manifest/files.txt
          echo "" >> manifest/files.txt
          
          # Find all files and add their content
          find . -type f \
            -not -path "./.git/*" \
            -not -path "*/node_modules/*" \
            -not -path "*/build/*" \
            -not -path "*/dist/*" \
            -not -name "*.lock" \
            -not -name "*.log" \
            | sort | while read file; do
            
            echo "FILE: $file" >> manifest/files.txt
            echo "========================================" >> manifest/files.txt
            
            # Special handling for yield_history.csv - only show first 5 and last 5 rows
            if [[ "$file" == *"data/yield_history.csv" ]]; then
              if [ -f "$file" ]; then
                # Get total lines
                total_lines=$(wc -l < "$file")
                
                if [ "$total_lines" -le 10 ]; then
                  # If file has 10 or fewer lines, show all
                  cat "$file" 2>/dev/null >> manifest/files.txt || echo "[BINARY FILE]" >> manifest/files.txt
                else
                  # Show first 5 lines
                  head -n 5 "$file" >> manifest/files.txt
                  echo ". . . . ." >> manifest/files.txt
                  # Show last 5 lines
                  tail -n 5 "$file" >> manifest/files.txt
                fi
              else
                echo "[FILE NOT FOUND]" >> manifest/files.txt
              fi
            elif [[ "$file" == reports/* ]]; then
              # For files in reports folder, only show filename, not content
              echo "[CONTENT OMITTED - REPORTS FOLDER]" >> manifest/files.txt
            else
              # For all other files, show full content
              cat "$file" 2>/dev/null >> manifest/files.txt || echo "[BINARY FILE]" >> manifest/files.txt
            fi
            
            echo "" >> manifest/files.txt
            echo "" >> manifest/files.txt
          done
          
          # Count files
          echo "Total files processed: $(find . -type f | wc -l)" >> manifest/files.txt
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: file-manifest
          path: manifest/
