name: Gemma 2 9B Yield Report

on:
  schedule:
    - cron: '30 22 * * 1-5'
  workflow_dispatch:

jobs:
  gemma-report:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache Hugging Face models
        uses: actions/cache@v3
        with:
          path: ~/.cache/huggingface
          key: gemma-2-9b-cache

      - name: Create directories
        run: |
          mkdir -p data
          mkdir -p reports

      - name: Run Gemma analysis
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          HUGGINGFACE_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
        run: python scripts/run_gemma.py

      - name: Commit and push Gemma report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add reports/gemma_*.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "Gemma report $(date +'%Y-%m-%d')"
          git push
