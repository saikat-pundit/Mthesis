name: Gemini Daily Macro Report

on:
  schedule:
    # Runs at 4:30 AM UTC every single day (Sunday to Saturday)
    - cron: '10 23 * * *'
  workflow_dispatch:

# Prevents simultaneous runs from colliding when pushing to git
concurrency:
  group: daily-report-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 1
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # Automatically caches requirements to speed up future runs
        
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Create directories
      run: |
        mkdir -p data
        mkdir -p reports
        
    - name: Fetch full historical data
      id: fetch_step  # <-- Added ID to track this step's output
      env:
        FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      run: |
        echo "📅 Fetching data updates..."
        python scripts/fetch_all_data.py
        
        # Check if the data directory has changes (new rows appended)
        git status --short data/
        if git diff --quiet data/; then
          echo "📊 No new macro data detected. Skipping AI report generation."
          echo "new_data=false" >> $GITHUB_OUTPUT
        else
          echo "🔥 New macro rows appended. Proceeding to AI analysis."
          echo "new_data=true" >> $GITHUB_OUTPUT
        fi
        
    - name: Run daily yield report
      if: steps.fetch_step.outputs.new_data == 'true'  # <-- Will only run if new data exists
      env:
        FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python scripts/daily_yield_report.py
        
    - name: Commit and push changes
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add data/ reports/
        
        # Only commit and push if there are actual modifications saved
        if ! git diff --quiet || ! git diff --staged --quiet; then
          git commit -m "gemini_report $(date +'%Y-%m-%d %H:%M:%S')"
          git push
        else
          echo "📁 No changes to commit."
        fi
