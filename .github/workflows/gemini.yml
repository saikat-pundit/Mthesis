name: Gemini Daily Macro Report

on:
  schedule:
    # Runs at 4:30 AM UTC every single day (Sunday to Saturday)
    - cron: '10 23 * * *'
  workflow_dispatch:

# Prevents simultaneous runs from colliding when pushing to git
concurrency:
  group: daily-report-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 1
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # Automatically caches requirements to speed up future runs
        
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Create directories
      run: |
        mkdir -p data
        mkdir -p reports
        
    - name: Fetch full historical data
      id: fetch_step
      env:
        FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      run: |
        echo "📅 Ensuring data is up to date..."
        python scripts/fetch_all_data.py
        
        # 1. Extract the very last date from the CSV (grabs the last row, splits by comma, gets first column)
        LAST_DATE=$(tail -n 1 data/yield_history.csv | cut -d',' -f1)
        echo "Latest date in CSV is: $LAST_DATE"
        
        # 2. Check if the AI report for this specific date already exists
        if [ -f "reports/gemini_report_${LAST_DATE}.txt" ]; then
          echo "📊 gemini_report_${LAST_DATE}.txt already exists. Skipping AI generation."
          echo "run_ai=false" >> $GITHUB_OUTPUT
        else
          echo "🔥 Report for $LAST_DATE is missing. Proceeding to AI analysis."
          echo "run_ai=true" >> $GITHUB_OUTPUT
        fi
        
    - name: Run parallel Qwen yield report
      if: steps.fetch_step.outputs.run_ai == 'true'
      env:
        NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      run: |
        python scripts/gemini.py
        
    - name: Commit and push changes
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add data/ reports/
        
        # Only commit and push if there are actual modifications saved
        if ! git diff --quiet || ! git diff --staged --quiet; then
          git commit -m "gemini_report $(date +'%Y-%m-%d %H:%M:%S')"
          git push
        else
          echo "📁 No changes to commit."
        fi
