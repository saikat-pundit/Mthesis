name: Daily Yield Curve Report

on:
  schedule:
    # Run at 6:00 AM IST (12:30 AM UTC during standard time, 12:00 AM UTC during DST)
    # Using 12:30 AM UTC which covers both cases
    - cron: '30 0 * * 1-5'
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Create directories
      run: |
        mkdir -p data
        mkdir -p reports
        
    - name: Backfill historical data (if missing)
      env:
        FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      run: |
        # Only run backfill if CSV doesn't exist or is empty
        if [ ! -s data/yield_history.csv ]; then
          echo "📅 No historical data found. Running backfill..."
          python scripts/backfill_history.py
        else
          echo "✅ Historical data already exists."
        fi
        
    - name: Run daily yield report
      env:
        FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      run: |
        python scripts/daily_yield_report.py
        
    - name: Commit and push changes
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add data/ reports/
        git diff --quiet && git diff --staged --quiet || git commit -m "Daily yield report $(date +'%Y-%m-%d %H:%M:%S')"
        git push
