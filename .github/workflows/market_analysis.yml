name: Indian Stock Market AI Analysis

on:
  workflow_dispatch:
  schedule:
    - cron: '30 17 * * *'  # 11:00 PM IST (5:30 PM UTC)

jobs:
  analyze_market_data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy openai requests

      - name: Run FO Position Update
        run: python scripts/FO_Position.py

      - name: Run Data Processing & AI Analysis
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: python scripts/data_processing.py
