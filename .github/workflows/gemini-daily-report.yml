name: Daily Yield Curve Report

on:
  schedule:
    - cron: '30 4 * * 1-5'
  workflow_dispatch:

# Prevents simultaneous runs from colliding when pushing to git
concurrency:
  group: daily-report-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4  # Upgraded to v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 1
      
    - name: Set up Python
      uses: actions/setup-python@v5  # Upgraded to v5
      with:
        python-version: '3.10'
        cache: 'pip' # Automatically caches requirements to speed up future runs
        
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Create directories
      run: |
        mkdir -p data
        mkdir -p reports
        
    - name: Fetch full historical data
      env:
        FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      run: |
        echo "📅 Fetching data updates..."
        python scripts/fetch_all_data.py  # Fixed the script name!
        
    - name: Run daily yield report
      env:
        FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python scripts/daily_yield_report.py
        
    - name: Commit and push changes
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add data/ reports/
        git diff --quiet && git diff --staged --quiet || git commit -m "gemini_report $(date +'%Y-%m-%d %H:%M:%S')"
        git push
