name: Hugging Face Cloud Yield Report

on:
  schedule:
    - cron: '30 23 * * 1-5'
  workflow_dispatch:

jobs:
  hf-cloud-report:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests pandas python-dotenv

      - name: Create directories
        run: |
          mkdir -p data
          mkdir -p reports

      - name: Run Hugging Face cloud analysis
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          HUGGINGFACE_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
        run: python scripts/run_hf_api.py

      - name: Commit and push report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add reports/hf_*.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "HF cloud report $(date +'%Y-%m-%d')"
          git push
